name: Flutter APK Build

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - master

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Java 17 설정
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Flutter 설정
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.2'
          channel: 'stable'
          cache: true

      - name: ONNX 모델 파일 확인
        run: |
          if [ ! -f "crosswalk_app/assets/model/crosswalk_model.onnx" ]; then
            echo "⚠️  모델 파일 없음 - 더미 파일로 빌드 진행"
            echo "placeholder" > crosswalk_app/assets/model/crosswalk_model.onnx
          else
            SIZE=$(du -sh crosswalk_app/assets/model/crosswalk_model.onnx | cut -f1)
            echo "✅ ONNX 모델 존재 ($SIZE)"
          fi

      - name: Flutter 패키지 설치
        working-directory: crosswalk_app
        run: flutter pub get

      - name: APK 빌드
        working-directory: crosswalk_app
        run: flutter build apk --release --no-shrink

      - name: APK 업로드 (Artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: crosswalk-app-${{ github.sha }}
          path: crosswalk_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: 빌드 결과 요약
        run: |
          APK_PATH="crosswalk_app/build/app/outputs/flutter-apk/app-release.apk"
          APK_SIZE=$(du -sh "$APK_PATH" | cut -f1)
          echo "## ✅ APK 빌드 완료" >> $GITHUB_STEP_SUMMARY
          echo "| 항목 | 내용 |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| 파일 크기 | $APK_SIZE |" >> $GITHUB_STEP_SUMMARY
          echo "| 커밋 | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 브랜치 | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Actions 탭 → 해당 워크플로우 → Artifacts에서 APK 다운로드**" >> $GITHUB_STEP_SUMMARY
